<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>善的旅程 Journey of Kindness | AI 教育遊戲</title>
    <meta name="description" content="慈濟人文學校 AI 教育互動遊戲 - 透過5個關卡學習AI基礎知識，體驗用智慧與善心幫助他人">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Google Analytics GA4 - 請將 G-XXXXXXXXXX 替換為你的 Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XXXXXXXXXX');
        
        // 追蹤關卡點擊事件
        function trackLevelClick(levelNum, levelName) {
            gtag('event', 'level_start', {
                'event_category': 'Game',
                'event_label': levelName,
                'level_number': levelNum
            });
        }
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            overflow-x: hidden;
        }
        
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .lang-toggle {
            position: absolute;
            top: 1rem; right: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .lang-btn {
            padding: 0.5rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .lang-btn:hover, .lang-btn.active {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }
        
        header {
            text-align: center;
            padding: 1.5rem 0 2rem;
            animation: fadeInDown 1s ease-out;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ffd700, #ffeb3b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #a0c4ff;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        .author-info {
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }
        
        .levels-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 0.5rem 0;
        }
        
        .level-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: white;
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        .level-card:nth-child(1) { animation-delay: 0.1s; }
        .level-card:nth-child(2) { animation-delay: 0.2s; }
        .level-card:nth-child(3) { animation-delay: 0.3s; }
        .level-card:nth-child(4) { animation-delay: 0.4s; }
        .level-card:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .level-card:hover {
            transform: translateX(8px) scale(1.02);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.1));
            border-color: #ffd700;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2);
        }
        
        .level-icon {
            font-size: 2.5rem;
            width: 65px; height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        
        .level-info { flex: 1; }
        
        .level-number {
            font-size: 0.8rem;
            color: #ffd700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
        }
        
        .level-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        
        .level-subtitle {
            font-size: 0.9rem;
            color: #a0c4ff;
        }
        
        .level-arrow {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }
        
        .level-card:hover .level-arrow {
            color: #ffd700;
            transform: translateX(5px);
        }
        
        .level-1 .level-icon { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); }
        .level-2 .level-icon { background: linear-gradient(135deg, #4ecdc4, #3db9b1); }
        .level-3 .level-icon { background: linear-gradient(135deg, #a855f7, #9333ea); }
        .level-4 .level-icon { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .level-5 .level-icon { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        
        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }
        
        .tzu-chi-logo { font-size: 1.3rem; margin-bottom: 0.3rem; }
        
        footer a {
            color: #ffd700;
            text-decoration: none;
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid #ffd700;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        footer a:hover {
            background: rgba(255, 215, 0, 0.2);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; }
            .subtitle { font-size: 0.9rem; }
            .logo { font-size: 2.5rem; }
            .level-card { padding: 1rem; gap: 1rem; }
            .level-icon { width: 55px; height: 55px; font-size: 2rem; }
            .level-title { font-size: 1rem; }
            .lang-toggle { position: static; justify-content: center; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="lang-toggle">
            <button class="lang-btn active" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        
        <header>
            <div class="logo">🌱</div>
            <h1 data-zh="善的旅程" data-en="Journey of Kindness">善的旅程</h1>
            <p class="subtitle" data-zh="AI 教育互動遊戲" data-en="AI Educational Interactive Game">AI 教育互動遊戲</p>
            <p class="author-info" data-zh="CS4 期末專案 | Mei Hsien" data-en="CS4 Final Project | Mei Hsien">CS4 期末專案 | Mei Hsien</p>
        </header>
        
        <div class="levels-container">
            <a href="level1/journey_of_kindness_v9.html" class="level-card level-1" onclick="trackLevelClick(1, 'Decision Tree')">
                <div class="level-icon">🎯</div>
                <div class="level-info">
                    <div class="level-number" data-zh="第一關" data-en="Level 1">第一關</div>
                    <div class="level-title" data-zh="決策樹 Decision Tree" data-en="Decision Tree">決策樹 Decision Tree</div>
                    <div class="level-subtitle" data-zh="小明的選擇 · 學習明智決策" data-en="Xiao Ming's Choice · Learn wise decisions">小明的選擇 · 學習明智決策</div>
                </div>
                <div class="level-arrow">→</div>
            </a>
            
            <a href="level2/level2_propositional_logic.html" class="level-card level-2" onclick="trackLevelClick(2, 'Propositional Logic')">
                <div class="level-icon">🏫</div>
                <div class="level-info">
                    <div class="level-number" data-zh="第二關" data-en="Level 2">第二關</div>
                    <div class="level-title" data-zh="命題邏輯 Propositional Logic" data-en="Propositional Logic">命題邏輯 Propositional Logic</div>
                    <div class="level-subtitle" data-zh="Happy Campus · 邏輯思考解題" data-en="Happy Campus · Logical thinking">Happy Campus · 邏輯思考解題</div>
                </div>
                <div class="level-arrow">→</div>
            </a>
            
            <a href="level3/level3_mdp.html" class="level-card level-3" onclick="trackLevelClick(3, 'MDP')">
                <div class="level-icon">🧘</div>
                <div class="level-info">
                    <div class="level-number" data-zh="第三關" data-en="Level 3">第三關</div>
                    <div class="level-title" data-zh="馬可夫決策 MDP" data-en="Markov Decision Process">馬可夫決策 MDP</div>
                    <div class="level-subtitle" data-zh="心靈旅程 · 探索連續決策智慧" data-en="Mind Journey · Sequential decisions">心靈旅程 · 探索連續決策智慧</div>
                </div>
                <div class="level-arrow">→</div>
            </a>
            
            <a href="level4/level4_final.html" class="level-card level-4" onclick="trackLevelClick(4, 'Search Algorithm')">
                <div class="level-icon">🚐</div>
                <div class="level-info">
                    <div class="level-number" data-zh="第四關" data-en="Level 4">第四關</div>
                    <div class="level-title" data-zh="搜尋演算法 Search Algorithm" data-en="Search Algorithm">搜尋演算法 Search Algorithm</div>
                    <div class="level-subtitle" data-zh="RV Park 探索 · 找到最佳路徑" data-en="RV Park · Find optimal path">RV Park 探索 · 找到最佳路徑</div>
                </div>
                <div class="level-arrow">→</div>
            </a>
            
            <a href="level5/level5_bayesian_network.html" class="level-card level-5" onclick="trackLevelClick(5, 'Bayesian Network')">
                <div class="level-icon">🌐</div>
                <div class="level-info">
                    <div class="level-number" data-zh="第五關" data-en="Level 5">第五關</div>
                    <div class="level-title" data-zh="貝氏網路 Bayesian Network" data-en="Bayesian Network">貝氏網路 Bayesian Network</div>
                    <div class="level-subtitle" data-zh="社區關懷地圖 · 建立愛的網路" data-en="Community Care Map · Build caring network">社區關懷地圖 · 建立愛的網路</div>
                </div>
                <div class="level-arrow">→</div>
            </a>
        </div>
        
        <footer>
            <div class="tzu-chi-logo">🪷</div>
            <p data-zh="慈濟基金會 人文學校" data-en="Tzu Chi Foundation Humanity School">慈濟基金會 人文學校</p>
            <a href="outro.html" data-zh="🌍 完成遊戲後請填寫問卷" data-en="🌍 Please fill survey after completing">🌍 完成遊戲後請填寫問卷</a>
        </footer>
    </div>
    
    <script>
        // Create stars
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();
        
        // Language toggle
        let currentLang = 'zh';
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(lang === 'zh' ? '中文' : 'English'));
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            localStorage.setItem('jok-lang', lang);
            
            // Track language change
            if (typeof gtag !== 'undefined') {
                gtag('event', 'language_change', { 'language': lang });
            }
        }
        
        const savedLang = localStorage.getItem('jok-lang');
        if (savedLang) setLang(savedLang);
    </script>
</body>
</html>
